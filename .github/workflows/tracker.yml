name: Stock Tracker Scheduler

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore tracker cache
        uses: actions/cache@v4
        with:
          path: .tracker-cache.json
          key: tracker-cache-${{ github.repository }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate secrets
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$FINNHUB_KEY" ]; then
            echo "::error::FINNHUB_KEY secret is missing or empty."
            echo "::error::Go to Settings > Secrets and variables > Actions and set FINNHUB_KEY to your Finnhub API key."
            exit 1
          fi
          echo "FINNHUB_KEY is configured."
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY not set; tracker will use fallback summaries."
          else
            echo "GEMINI_API_KEY is configured."
          fi

      - name: Run tracker once
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install
          npm run run-once

      - name: Commit updated dashboard data
        run: |
          if [ -n "$(git status --porcelain public/data/latest.json 2>/dev/null)" ]; then
            git add public/data/latest.json
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update stock tracker data"
            git push
          else
            echo "No changes to commit"
          fi
