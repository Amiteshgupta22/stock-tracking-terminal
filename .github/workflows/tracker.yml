name: Stock Tracker Scheduler

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

concurrency:
  group: stock-tracker-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Workflow version (must be v2)
        run: |
          echo "Workflow v2 — publishes via GitHub API (no git stash)"
          echo "If you see 'git stash' errors, you re-ran an OLD failed job."
          echo "Use Actions → Stock Tracker Scheduler → Run workflow instead."

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Restore tracker cache
        uses: actions/cache@v4
        with:
          path: .tracker-cache.json
          key: tracker-cache-${{ github.repository }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Validate secrets
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [ -z "$FINNHUB_KEY" ]; then
            echo "::error::FINNHUB_KEY secret is missing or empty."
            echo "::error::Go to Settings > Secrets and variables > Actions and set FINNHUB_KEY to your Finnhub API key."
            exit 1
          fi
          echo "FINNHUB_KEY is configured."
          if [ -z "$GEMINI_API_KEY" ]; then
            echo "::warning::GEMINI_API_KEY not set; tracker will use fallback summaries."
          else
            echo "GEMINI_API_KEY is configured."
          fi

      - name: Run tracker once
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm install
          npm run run-once

      - name: Publish dashboard data
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ ! -f public/data/latest.json ]; then
            echo "No latest.json generated; skipping publish"
            exit 0
          fi

          # Update a single file via GitHub API (no git stash/merge/rebase conflicts).
          for attempt in 1 2 3; do
            SHA=""
            SHA=$(gh api "repos/${GITHUB_REPOSITORY}/contents/public/data/latest.json" -q .sha 2>/dev/null || true)

            ARGS=(
              --method PUT
              -f message="chore: update stock tracker data"
              -f content="$(base64 -w 0 public/data/latest.json)"
              -f branch=master
            )
            if [ -n "$SHA" ]; then
              ARGS+=(-f "sha=${SHA}")
            fi

            if gh api "repos/${GITHUB_REPOSITORY}/contents/public/data/latest.json" "${ARGS[@]}"; then
              echo "Published latest.json on attempt ${attempt}"
              exit 0
            fi

            echo "Publish failed on attempt ${attempt}, retrying..."
            sleep 2
          done

          echo "::error::Failed to publish latest.json after 3 attempts"
          exit 1
