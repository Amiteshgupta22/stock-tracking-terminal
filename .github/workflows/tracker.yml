name: Stock Tracker Scheduler

on:
  schedule:
    - cron: "0 16 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run tracker once
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          npm ci || npm install
          npm run run-once

      - name: Commit updated data
        run: |
          if [ -n "$(git status --porcelain public/data/latest.json .tracker-cache.json 2>/dev/null)" ]; then
            git add public/data/latest.json .tracker-cache.json
            git -c user.name="github-actions[bot]" -c user.email="41898282+github-actions[bot]@users.noreply.github.com" commit -m "chore: update stock tracker data"
            git push
          else
            echo "No changes to commit"
          fi
